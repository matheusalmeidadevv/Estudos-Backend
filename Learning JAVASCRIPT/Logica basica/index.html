<!DOCTYPE html>
<!-- 
  Este é o DOCTYPE, que declara que este arquivo é um documento HTML5.
  Ele informa ao navegador qual versão do HTML estamos usando.
-->
<html lang="pt-BR">
<!-- 
  A tag <html> é o elemento raiz do documento HTML.
  O atributo lang="pt-BR" indica que o conteúdo está em português brasileiro,
  ajudando ferramentas de acessibilidade e motores de busca.
-->
<head>
  <!-- 
    A seção <head> contém metadados sobre o documento, como configurações
    que não são visíveis na página, mas importantes para o navegador.
  -->
  <meta charset="UTF-8">
  <!-- 
    Esta meta tag define a codificação de caracteres como UTF-8,
    que suporta a maioria dos caracteres, incluindo acentos em português.
  -->
    
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 
    Esta meta tag configura a viewport para dispositivos móveis,
    garantindo que a página se adapte ao tamanho da tela.
  -->

  <title>Página inicial</title>
 
  <link rel="stylesheet" href="style.css">
  <!-- 
    Esta tag <link> conecta um arquivo CSS externo chamado "style.css"
    para estilizar a aparência da página.
  -->
</head>
<body>
  
  <div class="container">
    <!-- 
      Uma div com classe "container" para agrupar e organizar os elementos.
      Classes são usadas no CSS para aplicar estilos.
    -->

    <h1>Boas vindas!</h1>
  
    <p>Vamos personalizar sua saudação usando JavaScript!</p>

    
    <div class="saudacao" id="mencao">Olá, visitante!</div>
    <!-- 
      Uma div com classe "saudacao" e id "mencao".
      O id é único e usado pelo JavaScript para identificar este elemento.
      Inicialmente mostra "Olá, visitante!".
    -->

    <button onclick="altera()">
        Personalizar saudação
    </button>
    <!-- 
      Um botão que, quando clicado, chama a função JavaScript "altera()".
      O atributo onclick define uma ação para o evento de clique.
    -->
  </div>

  <script>
    /* 
      A tag <script> contém código JavaScript que será executado pelo navegador.
      Aqui, definimos uma função que interage com os elementos HTML.
    */

    function altera(){
        // Esta é uma função JavaScript chamada "altera".
        // Funções são blocos de código reutilizáveis que executam tarefas específicas.
        
        document.getElementById ("mencao").textContent = "Ola SIXSEVEN"
        // "document" representa a página HTML.
        // getElementById("mencao") encontra o elemento com id "mencao".
        // textContent define o texto dentro desse elemento para "Ola SIXSEVEN".
        // Isso muda a saudação quando o botão é clicado.
    }

  </script>
</body>
</html>
